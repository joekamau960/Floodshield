<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Dashboard - FloodShield</title><link rel="stylesheet" href="/css/ui.css"/><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script></head><body><div class="app"><aside class="sidebar-app"><div class="logo-row"><img src="/assets/logo.svg"/><h2>FloodShield</h2></div><nav class="side-nav"><a href="/dashboard.html" class="side-link active">Overview</a><a href="/dashboard.html#map" class="side-link">Map</a><a href="/dashboard.html#forecast" class="side-link">Forecast</a><a href="/dashboard.html#alerts" class="side-link">Alerts</a><a href="/assets.html" class="side-link">Assets</a><a href="/analytics.html" class="side-link">Analytics</a></nav><div class="side-footer">Guest</div></aside><main class="main-app"><header class="app-header"><h1>Overview</h1><div class="header-controls"><button id="btn-live" class="btn small">Live Stream</button><button id="btn-export" class="btn small">Export Alerts</button></div></header><section class="grid"><div class="card metric"><h4>Predicted Rainfall</h4><div id="rainfall-big" class="value">-- mm/hr</div></div><div class="card metric"><h4>System Status</h4><div id="system-status" class="value">Operational</div></div><div class="card metric"><h4>Active Alerts</h4><div id="alerts-count" class="value">0</div></div></section><section id="map" class="map-card card"></section><section id="forecast" class="card"><h3>12-hour Forecast</h3><canvas id="forecastChart" height="100"></canvas></section><section id="alerts" class="card"><h3>Recent Infrastructure Alerts</h3><ul id="alerts-list"></ul></section></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="/js/dashboard.js"></script></body></html>
