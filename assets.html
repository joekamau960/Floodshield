<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Assets - FloodShield</title><link rel="stylesheet" href="/css/ui.css"/><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/></head><body><nav class="nav small"><div class="brand"><img src="/assets/logo.svg"/> FloodShield</div><ul class="nav-links"><li><a href="/dashboard.html">Dashboard</a></li><li><a href="/assets.html" class="active">Assets</a></li></ul></nav><main class="content"><h2>Infrastructure Assets</h2><div class="card asset-layout"><div class="asset-list"><ul id="asset-list"></ul></div><div class="asset-map" id="asset-map"></div></div></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>const map=L.map('asset-map').setView([-1.286389,36.817223],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);fetch('/api/predict').then(r=>r.json()).then(data=>{const infra=data.infrastructureStatus;const ul=document.getElementById('asset-list');ul.innerHTML='';Object.entries(infra).forEach(([id,a])=>{const li=document.createElement('li');li.innerHTML=`<strong>${id}</strong><div>${a.status}</div>`;ul.appendChild(li);L.marker([a.lat,a.lon]).addTo(map).bindPopup(`${id} - ${a.status}`);});});</script></body></html>
